interface:
  display_name: "Codex Changelog"
  short_description: "Check the installed Codex CLI version and fetch/print the matching GitHub Releases changelog from https://github.com/openai/codex/releases. Use when users ask for their Codex version, release notes, or changelog for the installed CLI."
  brand_color: "#D1495B"
  default_prompt: "Use $codex-changelog to print the release notes for my installed Codex CLI version."
