interface:
  display_name: "Skill Audit"
  short_description: "Audit installed or user-specified Codex skills using repo evidence, memory, and current context to plan updates, merges, or disables."
  brand_color: "#C06C84"
  default_prompt: "Use $skill-audit to review either the installed skills relevant to this repo, excluding `skill-audit` unless the user explicitly asks for it, or only the skills explicitly named by the user, then produce a one-by-one improvement roadmap using repo docs, git history, memory, and only targeted session evidence."
