interface:
  display_name: "Skill Audit"
  short_description: "Audit installed Codex skills, plugins, and bundled plugin skills using repo evidence, memory, sessions, and current context to plan updates, merges, or disables."
  brand_color: "#C06C84"
  default_prompt: "Use $skill-audit to review the installed Codex surfaces relevant to the current workflow, including standalone skills, plugin packages, and bundled plugin skills, start from local discovery surfaces and widen only when needed, treat cache copies as evidence only, and produce a one-by-one improvement roadmap using repo docs, git history, memory, and representative session evidence whenever you are judging real behavior or correctness."
