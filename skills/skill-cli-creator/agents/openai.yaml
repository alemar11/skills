interface:
  display_name: "Skill CLI Creator"
  short_description: "Build host-aware embedded CLIs that live inside a skill or plugin, run from `scripts/`, and can grow into a maintenance-only project at `projects/<tool>/`."
  default_prompt: "Create or refactor an embedded CLI that lives inside a skill or plugin, resolve the host mode and owner boundary first, choose the host name and CLI/tool name explicitly instead of assuming they match, keep the shipped runnable artifact in `scripts/`, reserve `projects/<tool>/` for the maintenance-only build project when the implementation grows, require `--version` with one semver source of truth, use owner-aligned `config.toml` with `schema_version`, and add a `CLI Maintenance` section plus `projects/<tool>/AGENTS.md` and a scoped `projects/<tool>/.gitignore` when that project layout is introduced."
  brand_color: "#2563EB"
